# LGDB config
# Indent nested config with tabs.

work_dir = ./
pidfile = ./lgdb.pid

server:
	port: 7899
	ip: 127.0.0.1
	#auth: this-is-a-very-strong-password-32ch
	#readonly: yes
	#slowlog_timeout: 5

replication:
	binlog: yes
	sync_speed: -1

logger:
	level: warn
	output: log.txt
	rotate:
		size: 1000000000

leveldb:
	cache_size: 500
	write_buffer_size: 16
	block_size: 32
	compaction_speed: 1000
	compression: yes